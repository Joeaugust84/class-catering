<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Class Catering — Control de Alquileres</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C87A;
    --dark: #1A1209;
    --surface: #231A0A;
    --card: #2C2010;
    --border: #3D2E14;
    --text: #F5EDD8;
    --muted: #9A8A6A;
    --green: #5BAD78;
    --red: #C96060;
    --amber: #D4943A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 80px;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--surface) 0%, #1A1209 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .brand { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--gold); letter-spacing: 0.5px; }
  .brand span { font-size: 0.75rem; font-family: 'DM Sans', sans-serif; color: var(--muted); font-weight: 400; display: block; margin-top: 1px; }
  .header-badge {
    background: var(--gold);
    color: var(--dark);
    font-size: 0.65rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 1;
    min-width: 80px;
    padding: 12px 8px;
    text-align: center;
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .tab-icon { font-size: 1.1rem; display: block; margin-bottom: 2px; }

  /* PAGES */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* CARDS */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-title { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--gold); margin-bottom: 12px; }

  /* ITEM CARD */
  .item-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.2s;
  }
  .item-icon {
    font-size: 1.8rem;
    width: 48px;
    height: 48px;
    background: var(--surface);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-weight: 600; font-size: 0.92rem; color: var(--text); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-cat { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .item-stock-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .stock-pill {
    font-size: 0.72rem;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 20px;
  }
  .pill-total { background: rgba(201,168,76,0.15); color: var(--gold); }
  .pill-out { background: rgba(201,96,96,0.15); color: var(--red); }
  .pill-avail { background: rgba(91,173,120,0.15); color: var(--green); }
  .item-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
  .btn-sm {
    font-size: 0.72rem;
    font-weight: 600;
    padding: 6px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: opacity 0.2s;
  }
  .btn-salida { background: var(--red); color: #fff; }
  .btn-entrada { background: var(--green); color: #fff; }
  .btn-sm:disabled { opacity: 0.3; cursor: not-allowed; }

  /* FORMS */
  .form-group { margin-bottom: 14px; }
  label { font-size: 0.75rem; color: var(--muted); font-weight: 500; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  input, select, textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--gold); }
  select option { background: var(--surface); }

  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    margin-top: 6px;
  }
  .emoji-btn {
    font-size: 1.4rem;
    background: var(--surface);
    border: 2px solid transparent;
    border-radius: 10px;
    padding: 6px;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.15s;
  }
  .emoji-btn.selected { border-color: var(--gold); background: rgba(201,168,76,0.1); }

  .btn-primary {
    width: 100%;
    background: var(--gold);
    color: var(--dark);
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: opacity 0.2s;
    margin-top: 4px;
  }
  .btn-primary:active { opacity: 0.85; }

  /* MOVEMENT MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 4px; margin: 0 auto 16px; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 4px; }
  .modal-subtitle { font-size: 0.78rem; color: var(--muted); margin-bottom: 16px; }
  .modal-type-indicator {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 700;
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .type-salida { background: rgba(201,96,96,0.2); color: var(--red); }
  .type-entrada { background: rgba(91,173,120,0.2); color: var(--green); }
  .modal-actions { display: flex; gap: 10px; margin-top: 4px; }
  .btn-cancel { flex: 1; background: var(--card); color: var(--muted); border: 1px solid var(--border); border-radius: 12px; padding: 13px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; cursor: pointer; }
  .btn-confirm { flex: 2; background: var(--gold); color: var(--dark); border: none; border-radius: 12px; padding: 13px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 700; cursor: pointer; }
  .btn-confirm.danger { background: var(--red); color: #fff; }
  .btn-confirm.success { background: var(--green); color: #fff; }

  /* HISTORIAL */
  .mov-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .mov-item:last-child { border-bottom: none; }
  .mov-dot {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .dot-salida { background: rgba(201,96,96,0.15); }
  .dot-entrada { background: rgba(91,173,120,0.15); }
  .mov-body { flex: 1; }
  .mov-title { font-size: 0.85rem; font-weight: 600; color: var(--text); }
  .mov-meta { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  .mov-qty {
    font-size: 0.85rem;
    font-weight: 700;
    flex-shrink: 0;
    align-self: center;
  }
  .qty-salida { color: var(--red); }
  .qty-entrada { color: var(--green); }

  /* RESUMEN */
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--gold); }
  .stat-label { font-size: 0.7rem; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-box.green .stat-num { color: var(--green); }
  .stat-box.red .stat-num { color: var(--red); }

  /* FILTER BAR */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-chip.active { background: var(--gold); color: var(--dark); border-color: var(--gold); }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-icon { font-size: 3rem; margin-bottom: 10px; }
  .empty p { font-size: 0.88rem; }

  /* SEARCH */
  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-wrap input { padding-left: 40px; }
  .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 1rem; pointer-events: none; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card);
    border: 1px solid var(--gold);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 0.82rem;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    white-space: nowrap;
    z-index: 300;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* NAV BAR */
  .nav-bar {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
  }
  .nav-item {
    flex: 1;
    padding: 10px 4px;
    text-align: center;
    cursor: pointer;
    color: var(--muted);
    font-size: 0.65rem;
    font-weight: 500;
    transition: color 0.15s;
  }
  .nav-item.active { color: var(--gold); }
  .nav-item span { font-size: 1.3rem; display: block; margin-bottom: 2px; }

  /* DELETE btn */
  .btn-del { background: none; border: none; color: var(--muted); font-size: 1rem; cursor: pointer; padding: 4px; }
  .btn-del:hover { color: var(--red); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-top">
    <div class="brand">Class Catering <span>Control de Alquileres</span></div>
    <div class="header-badge">Stock</div>
  </div>
</header>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="goTab('inventario')"><span class="tab-icon">📦</span>Inventario</div>
  <div class="tab" onclick="goTab('movimiento')"><span class="tab-icon">↕️</span>Movimiento</div>
  <div class="tab" onclick="goTab('historial')"><span class="tab-icon">📋</span>Historial</div>
  <div class="tab" onclick="goTab('agregar')"><span class="tab-icon">➕</span>Nuevo Ítem</div>
</div>

<!-- PAGE: INVENTARIO -->
<div class="page active" id="page-inventario">
  <div class="summary-grid">
    <div class="stat-box">
      <div class="stat-num" id="s-total">0</div>
      <div class="stat-label">Ítems registrados</div>
    </div>
    <div class="stat-box red">
      <div class="stat-num" id="s-out">0</div>
      <div class="stat-label">Unidades fuera</div>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-inv" placeholder="Buscar ítem..." oninput="renderInventario()"/>
  </div>
  <div class="filter-bar" id="cat-filters"></div>
  <div id="inventario-list"></div>
</div>

<!-- PAGE: MOVIMIENTO RÁPIDO -->
<div class="page" id="page-movimiento">
  <div class="card">
    <div class="card-title">Registrar Movimiento</div>
    <div class="form-group">
      <label>Tipo de movimiento</label>
      <select id="mov-tipo">
        <option value="salida">📤 Salida — sale en alquiler</option>
        <option value="entrada">📥 Entrada — regresa del alquiler</option>
      </select>
    </div>
    <div class="form-group">
      <label>Ítem</label>
      <select id="mov-item"></select>
    </div>
    <div class="form-group">
      <label>Cantidad</label>
      <input type="number" id="mov-qty" min="1" value="1" placeholder="1"/>
    </div>
    <div class="form-group">
      <label>Cliente / Evento (opcional)</label>
      <input type="text" id="mov-cliente" placeholder="Ej: Boda García, Fiesta cumpleaños..."/>
    </div>
    <div class="form-group">
      <label>Nota (opcional)</label>
      <input type="text" id="mov-nota" placeholder="Ej: Devuelto con faltante de 2..."/>
    </div>
    <button class="btn-primary" onclick="registrarMovimiento()">Registrar Movimiento</button>
  </div>
</div>

<!-- PAGE: HISTORIAL -->
<div class="page" id="page-historial">
  <div class="filter-bar">
    <div class="filter-chip active" onclick="setHistFiltro('todo', this)">Todo</div>
    <div class="filter-chip" onclick="setHistFiltro('salida', this)">📤 Salidas</div>
    <div class="filter-chip" onclick="setHistFiltro('entrada', this)">📥 Entradas</div>
  </div>
  <div id="historial-list"></div>
</div>

<!-- PAGE: AGREGAR ÍTEM -->
<div class="page" id="page-agregar">
  <div class="card">
    <div class="card-title">Nuevo Ítem de Alquiler</div>
    <div class="form-group">
      <label>Nombre del ítem</label>
      <input type="text" id="new-nombre" placeholder="Ej: Mesa redonda 1.20m"/>
    </div>
    <div class="form-group">
      <label>Categoría</label>
      <input type="text" id="new-cat" placeholder="Ej: Mesas, Sillas, Enfriadores..."/>
    </div>
    <div class="form-group">
      <label>Cantidad total en stock</label>
      <input type="number" id="new-stock" min="1" value="1" placeholder="10"/>
    </div>
    <div class="form-group">
      <label>Ícono</label>
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>
    <button class="btn-primary" onclick="agregarItem()">Agregar al Inventario</button>
  </div>
</div>

<!-- MODAL MOVIMIENTO -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="modal-type-badge" class="modal-type-indicator"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-subtitle" id="modal-subtitle"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" id="modal-confirm" onclick="confirmarModal()">Confirmar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const EMOJIS = ['🪑','🛋️','🍽️','🥂','🍾','🎪','🧊','🫙','🕯️','🎶','🎤','🎷','🎸','🪩','💡','🔊','🚿','🏕️','🌿','🪴','🎀','🛒','📦','🧺','🪣','🧲','🍦','🎂','🥘','🫕'];

let items = JSON.parse(localStorage.getItem('cc_items') || '[]');
let historial = JSON.parse(localStorage.getItem('cc_hist') || '[]');
let selectedEmoji = '📦';
let pendingModal = null;
let histFiltro = 'todo';

function save() {
  localStorage.setItem('cc_items', JSON.stringify(items));
  localStorage.setItem('cc_hist', JSON.stringify(historial));
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function goTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const tabs = ['inventario','movimiento','historial','agregar'];
    t.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  if (tab === 'inventario') renderInventario();
  if (tab === 'movimiento') renderMovSelect();
  if (tab === 'historial') renderHistorial();
}

// ---- INVENTARIO ----
function getCategorias() {
  return [...new Set(items.map(i => i.cat).filter(Boolean))];
}

let activeCat = 'Todos';
function renderCatFilters() {
  const cats = ['Todos', ...getCategorias()];
  const bar = document.getElementById('cat-filters');
  bar.innerHTML = cats.map(c => `<div class="filter-chip ${c===activeCat?'active':''}" onclick="setCat('${c}',this)">${c}</div>`).join('');
}
function setCat(c, el) {
  activeCat = c;
  document.querySelectorAll('#cat-filters .filter-chip').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  renderInventario();
}

function renderInventario() {
  renderCatFilters();
  const q = document.getElementById('search-inv').value.toLowerCase();
  let filtered = items.filter(it => {
    const matchQ = it.nombre.toLowerCase().includes(q) || it.cat.toLowerCase().includes(q);
    const matchC = activeCat === 'Todos' || it.cat === activeCat;
    return matchQ && matchC;
  });

  const totalItems = items.length;
  const totalOut = items.reduce((a,b) => a + (b.salidas||0), 0);
  document.getElementById('s-total').textContent = totalItems;
  document.getElementById('s-out').textContent = totalOut;

  const list = document.getElementById('inventario-list');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>No hay ítems todavía.<br>Agregá uno desde "Nuevo Ítem".</p></div>`;
    return;
  }
  list.innerHTML = filtered.map(it => {
    const avail = it.stock - (it.salidas||0);
    return `<div class="item-card">
      <div class="item-icon">${it.emoji}</div>
      <div class="item-info">
        <div class="item-name">${it.nombre}</div>
        <div class="item-cat">${it.cat}</div>
        <div class="item-stock-row">
          <span class="stock-pill pill-total">Total: ${it.stock}</span>
          <span class="stock-pill pill-out">Fuera: ${it.salidas||0}</span>
          <span class="stock-pill pill-avail">Disp: ${avail}</span>
        </div>
      </div>
      <div class="item-actions">
        <button class="btn-sm btn-salida" onclick="openModal('salida','${it.id}')" ${avail<=0?'disabled':''}>📤 Salida</button>
        <button class="btn-sm btn-entrada" onclick="openModal('entrada','${it.id}')" ${(it.salidas||0)<=0?'disabled':''}>📥 Entrada</button>
      </div>
    </div>`;
  }).join('');
}

// ---- MODAL RÁPIDO ----
function openModal(tipo, itemId) {
  const it = items.find(x => x.id === itemId);
  if (!it) return;
  const avail = it.stock - (it.salidas||0);
  pendingModal = { tipo, itemId, qty: 1 };
  document.getElementById('modal-title').textContent = it.emoji + ' ' + it.nombre;
  const badge = document.getElementById('modal-type-badge');
  const confirm = document.getElementById('modal-confirm');
  if (tipo === 'salida') {
    badge.textContent = '📤 Registrar Salida';
    badge.className = 'modal-type-indicator type-salida';
    document.getElementById('modal-subtitle').textContent = `Disponible: ${avail} unidad${avail!==1?'es':''} — ¿Cuántas salen?`;
    confirm.className = 'btn-confirm danger';
    confirm.textContent = 'Registrar salida';
  } else {
    badge.textContent = '📥 Registrar Entrada';
    badge.className = 'modal-type-indicator type-entrada';
    document.getElementById('modal-subtitle').textContent = `En alquiler: ${it.salidas||0} unidad${(it.salidas||0)!==1?'es':''} — ¿Cuántas regresan?`;
    confirm.className = 'btn-confirm success';
    confirm.textContent = 'Registrar entrada';
  }
  document.getElementById('modal').classList.add('open');
}
function closeModal(e) {
  if (!e || e.target.id === 'modal') {
    document.getElementById('modal').classList.remove('open');
    pendingModal = null;
  }
}
function confirmarModal() {
  if (!pendingModal) return;
  const { tipo, itemId } = pendingModal;
  const it = items.find(x => x.id === itemId);
  const avail = it.stock - (it.salidas||0);
  const qty = 1;
  if (tipo === 'salida' && avail < qty) { toast('⚠️ Sin stock disponible'); return; }
  if (tipo === 'entrada' && (it.salidas||0) < qty) { toast('⚠️ No hay unidades fuera'); return; }
  if (tipo === 'salida') it.salidas = (it.salidas||0) + qty;
  else it.salidas = Math.max(0, (it.salidas||0) - qty);
  historial.unshift({ id: Date.now(), tipo, itemId, itemNombre: it.nombre, itemEmoji: it.emoji, qty, cliente: '', nota: '', fecha: new Date().toLocaleString('es-PY') });
  save();
  document.getElementById('modal').classList.remove('open');
  pendingModal = null;
  toast(tipo === 'salida' ? '📤 Salida registrada' : '📥 Entrada registrada');
  renderInventario();
}

// ---- MOVIMIENTO COMPLETO ----
function renderMovSelect() {
  const sel = document.getElementById('mov-item');
  sel.innerHTML = items.map(it => `<option value="${it.id}">${it.emoji} ${it.nombre} — Disp: ${it.stock-(it.salidas||0)}</option>`).join('');
}
function registrarMovimiento() {
  const tipo = document.getElementById('mov-tipo').value;
  const itemId = document.getElementById('mov-item').value;
  const qty = parseInt(document.getElementById('mov-qty').value) || 1;
  const cliente = document.getElementById('mov-cliente').value.trim();
  const nota = document.getElementById('mov-nota').value.trim();
  const it = items.find(x => x.id === itemId);
  if (!it) { toast('⚠️ Seleccioná un ítem'); return; }
  const avail = it.stock - (it.salidas||0);
  if (tipo === 'salida' && avail < qty) { toast(`⚠️ Solo hay ${avail} disponibles`); return; }
  if (tipo === 'entrada' && (it.salidas||0) < qty) { toast(`⚠️ Solo hay ${it.salidas||0} fuera`); return; }
  if (tipo === 'salida') it.salidas = (it.salidas||0) + qty;
  else it.salidas = Math.max(0, (it.salidas||0) - qty);
  historial.unshift({ id: Date.now(), tipo, itemId, itemNombre: it.nombre, itemEmoji: it.emoji, qty, cliente, nota, fecha: new Date().toLocaleString('es-PY') });
  save();
  document.getElementById('mov-qty').value = 1;
  document.getElementById('mov-cliente').value = '';
  document.getElementById('mov-nota').value = '';
  toast(tipo === 'salida' ? '📤 Salida registrada' : '📥 Entrada registrada');
  renderMovSelect();
}

// ---- HISTORIAL ----
function setHistFiltro(f, el) {
  histFiltro = f;
  document.querySelectorAll('.filter-bar .filter-chip').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  renderHistorial();
}
function renderHistorial() {
  const list = document.getElementById('historial-list');
  let h = histFiltro === 'todo' ? historial : historial.filter(x => x.tipo === histFiltro);
  if (!h.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>Sin movimientos todavía.</p></div>`;
    return;
  }
  list.innerHTML = h.map(m => `
    <div class="mov-item">
      <div class="mov-dot ${m.tipo==='salida'?'dot-salida':'dot-entrada'}">${m.tipo==='salida'?'📤':'📥'}</div>
      <div class="mov-body">
        <div class="mov-title">${m.itemEmoji} ${m.itemNombre}</div>
        <div class="mov-meta">${m.fecha}${m.cliente?' · '+m.cliente:''}${m.nota?' · '+m.nota:''}</div>
      </div>
      <div class="mov-qty ${m.tipo==='salida'?'qty-salida':'qty-entrada'}">${m.tipo==='salida'?'-':'+'}${m.qty}</div>
    </div>`).join('');
}

// ---- AGREGAR ÍTEM ----
function initEmojiGrid() {
  const g = document.getElementById('emoji-grid');
  g.innerHTML = EMOJIS.map(e => `<div class="emoji-btn ${e===selectedEmoji?'selected':''}" onclick="selectEmoji('${e}',this)">${e}</div>`).join('');
}
function selectEmoji(e, el) {
  selectedEmoji = e;
  document.querySelectorAll('.emoji-btn').forEach(x => x.classList.remove('selected'));
  el.classList.add('selected');
}
function agregarItem() {
  const nombre = document.getElementById('new-nombre').value.trim();
  const cat = document.getElementById('new-cat').value.trim();
  const stock = parseInt(document.getElementById('new-stock').value) || 1;
  if (!nombre) { toast('⚠️ Escribí el nombre del ítem'); return; }
  if (!cat) { toast('⚠️ Escribí una categoría'); return; }
  items.push({ id: Date.now().toString(), nombre, cat, stock, salidas: 0, emoji: selectedEmoji });
  save();
  document.getElementById('new-nombre').value = '';
  document.getElementById('new-cat').value = '';
  document.getElementById('new-stock').value = 1;
  toast('✅ Ítem agregado al inventario');
  goTab('inventario');
}

// ---- INIT ----
initEmojiGrid();
renderInventario();
